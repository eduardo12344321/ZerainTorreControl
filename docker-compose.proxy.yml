version: '3.8'

services:
  proxy:
    image: 'jc21/nginx-proxy-manager:latest'
    container_name: zerain_proxy
    restart: unless-stopped
    ports:
      - '80:80'
      - '443:443'
      - '81:81'
    volumes:
      - ./nginx/data:/data
      - ./nginx/letsencrypt:/etc/letsencrypt
    networks:
      - zerain-net

networks:
  zerain-net:
    external: true
    name: zerain-infra_zerain-net
